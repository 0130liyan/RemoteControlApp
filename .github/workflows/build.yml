name: Build APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with: { java-version: '17', distribution: 'temurin' }
    - name: Build Controlled
      working-directory: controlled-device
      run: gradle wrapper && ./gradlew assembleDebug
    - name: Build Controller
      working-directory: controller-device
      run: gradle wrapper && ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with: { name: controlled-apk, path: 'controlled-device/app/build/outputs/apk/debug/*.apk' }
    - uses: actions/upload-artifact@v4
      with: { name: controller-apk, path: 'controller-device/app/build/outputs/apk/debug/*.apk' }
